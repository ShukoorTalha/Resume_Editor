version: '3.8'

services:
  app:
    # Notice this uses the pre-built image from GHCR instead of building from source
    # Provide the exact name of your repository here in lowercase, e.g., ghcr.io/shukoortalha/resume_editor:latest
    image: ghcr.io/shukoortalha/resume_editor:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    networks:
      - web

networks:
  web:
    driver: bridge
