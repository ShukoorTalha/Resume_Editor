version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    expose:
      - "3000"
    container_name: resume-builder-tunnel-app
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npx vite --host 0.0.0.0 --port 3000
    restart: unless-stopped
    networks:
      - tunnel_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: resume-builder-tunnel
    command: tunnel --config /etc/cloudflared/config.yml run 3b039d92-1f2f-4a24-96ac-2f2128103d0f
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml
      - ~/.cloudflared/3b039d92-1f2f-4a24-96ac-2f2128103d0f.json:/etc/cloudflared/creds.json
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - tunnel_network

networks:
  tunnel_network:
    driver: bridge
